<header class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 px-4 py-3 flex items-center justify-between">
  <div class="flex items-center space-x-4">
    <button @click="$dispatch('toggle-sidebar')" class="p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700">☰</button>
    <h1 class="text-lg font-semibold">{% block page_title %}Overview{% endblock %}</h1>
  </div>
  <div class="flex items-center space-x-4">
    <button @click="dark = !dark" class="px-3 py-1 rounded bg-gray-200 dark:bg-gray-700">Toggle</button>
    <div class="relative">
      <a href="/accounts/profile/" class="px-3 py-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700">Profile</a>
    </div>
  </div>
</header>
